# ============================================
# 研究领域模板（用于智能推荐）
# ============================================
research_area_templates:

  llm_nlp:
    name: "Large Language Models & NLP"
    description: "研究大语言模型、自然语言处理、文本生成等"
    topics:
      - "Large Language Models"
      - "Transformer Architecture"
      - "Natural Language Processing"
      - "Text Generation"
    keywords:
      - "transformer"
      - "BERT"
      - "GPT"
      - "attention mechanism"
      - "language model"
      - "pre-training"
      - "fine-tuning"
      - "prompt engineering"
    recommended_sources:
      arxiv: ["cs.CL", "cs.LG", "cs.AI"]
      conferences: ["acl", "emnlp", "naacl", "neurips", "icml", "iclr"]

  computer_vision:
    name: "Computer Vision"
    description: "研究图像识别、目标检测、图像生成等"
    topics:
      - "Computer Vision"
      - "Image Recognition"
      - "Object Detection"
      - "Image Generation"
    keywords:
      - "CNN"
      - "vision transformer"
      - "ViT"
      - "object detection"
      - "segmentation"
      - "image classification"
      - "diffusion model"
    recommended_sources:
      arxiv: ["cs.CV", "cs.LG", "cs.AI"]
      conferences: ["cvpr", "iccv", "eccv", "neurips", "icml"]

  reinforcement_learning:
    name: "Reinforcement Learning"
    description: "研究强化学习、多智能体系统、游戏AI等"
    topics:
      - "Reinforcement Learning"
      - "Multi-Agent Systems"
      - "Game AI"
      - "Decision Making"
    keywords:
      - "Q-learning"
      - "policy gradient"
      - "actor-critic"
      - "multi-agent"
      - "reward shaping"
      - "RLHF"
    recommended_sources:
      arxiv: ["cs.LG", "cs.AI", "cs.MA"]
      conferences: ["neurips", "icml", "iclr", "aaai", "ijcai"]

  circuit_design:
    name: "Circuit Design & EDA"
    description: "研究电路设计、硬件加速、EDA工具等"
    topics:
      - "Circuit Design"
      - "Hardware Acceleration"
      - "EDA Tools"
      - "FPGA Design"
    keywords:
      - "FPGA"
      - "ASIC"
      - "synthesis"
      - "placement"
      - "routing"
      - "timing analysis"
      - "logic optimization"
    recommended_sources:
      arxiv: ["cs.AR", "eess.SY"]
      conferences: ["dac", "iccad", "date", "isca"]

  robotics:
    name: "Robotics & Control"
    description: "研究机器人、运动规划、控制系统等"
    topics:
      - "Robotics"
      - "Motion Planning"
      - "Control Systems"
      - "Autonomous Systems"
    keywords:
      - "robot"
      - "manipulation"
      - "navigation"
      - "SLAM"
      - "control"
      - "path planning"
    recommended_sources:
      arxiv: ["cs.RO", "cs.AI", "eess.SY"]
      conferences: ["neurips", "icml", "aaai", "ijcai"]

  ml_systems:
    name: "ML Systems & Infrastructure"
    description: "研究机器学习系统、分布式训练、模型优化等"
    topics:
      - "ML Systems"
      - "Distributed Training"
      - "Model Optimization"
      - "Inference Acceleration"
    keywords:
      - "distributed training"
      - "model compression"
      - "quantization"
      - "pruning"
      - "inference"
      - "serving"
    recommended_sources:
      arxiv: ["cs.LG", "cs.DC", "cs.AR"]
      conferences: ["neurips", "icml", "isca", "asplos"]

  generative_models:
    name: "Generative Models"
    description: "研究生成模型、扩散模型、GAN等"
    topics:
      - "Generative Models"
      - "Diffusion Models"
      - "GANs"
      - "VAEs"
    keywords:
      - "diffusion"
      - "GAN"
      - "VAE"
      - "generative"
      - "image synthesis"
      - "text-to-image"
    recommended_sources:
      arxiv: ["cs.CV", "cs.LG", "cs.AI"]
      conferences: ["neurips", "icml", "iclr", "cvpr"]

