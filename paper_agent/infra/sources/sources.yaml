# Paper Agent 数据源配置文件
# 此文件定义所有可用的论文数据源

# ============================================
# arXiv 分类
# ============================================
arxiv_categories:
  cs.AI:
    name: "Artificial Intelligence"
    description: "Covers all areas of AI except Vision, Robotics, Learning"

  cs.CL:
    name: "Computation and Language"
    description: "Natural language processing, computational linguistics"

  cs.CV:
    name: "Computer Vision and Pattern Recognition"
    description: "Image processing, computer vision, pattern recognition"

  cs.LG:
    name: "Machine Learning"
    description: "Machine learning, neural networks, deep learning"

  cs.AR:
    name: "Hardware Architecture"
    description: "Computer architecture, FPGA, ASIC"

  cs.NE:
    name: "Neural and Evolutionary Computing"
    description: "Neural networks, genetic algorithms"

  cs.RO:
    name: "Robotics"
    description: "Robotics, autonomous systems"

  cs.MA:
    name: "Multiagent Systems"
    description: "Multi-agent systems, game theory"

  eess.SY:
    name: "Systems and Control"
    description: "Control systems, signal processing"

